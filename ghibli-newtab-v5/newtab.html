<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="newtab.css" />
</head>

<body>

  <div id="bg" class="bg"></div>
  <div class="vignette"></div>
  <canvas id="canvas"></canvas>

  <!-- Centre -->
  <main class="main">

    <div class="greeting-wrap">
      <span class="greet-word" id="greetJp">おはよう</span>
      <span class="greet-word hidden" id="greetEn">Good morning</span>
    </div>

    <h1 class="clock" id="clock">00:00</h1>
    <p class="date" id="date">Thursday, 1 January</p>

    <div class="search-wrap">
      <input id="search" class="search" type="text" placeholder="search or enter address" autocomplete="off"
        spellcheck="false" />
    </div>
  </main>

  <!-- Bottom bar -->
  <footer class="bar">

    <span class="scene-name" id="sceneName" title="Choose background">Totoro's Forest</span>

    <div class="music">
      <button class="icon-btn" id="prevScene" title="Previous scene">&#8592;</button>
      <button class="icon-btn" id="playBtn" title="Play / Pause">&#9654;</button>
      <button class="icon-btn" id="nextScene" title="Next scene">&#8594;</button>
      <span class="track-name" id="trackName">Forest Whispers</span>
      <input class="vol" id="vol" type="range" min="0" max="1" step="0.05" value="0.35" title="Volume" />
    </div>

    <nav class="shortcuts" id="shortcuts"></nav>
  </footer>

  <!-- BG Picker panel  -->
  <div class="picker-overlay" id="pickerOverlay">
    <div class="picker-panel">
      <div class="picker-header">
        <span class="picker-title">Choose a scene</span>
        <button class="picker-close" id="pickerClose">&#10005;</button>
      </div>
      <div class="picker-grid" id="pickerGrid"></div>
    </div>
  </div>

  <audio id="audio" loop></audio>
  <script src="newtab.js"></script>
</body>

</html>
